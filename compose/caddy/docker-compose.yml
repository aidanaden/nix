services:
  caddy:
    build: .
    image: caddy-sablier-cf:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
    networks:
      - caddy
      - authelia
    depends_on:
      - sablier
    mem_limit: 128m

  sablier:
    image: sablierapp/sablier:1.11.1
    container_name: sablier
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - caddy
    mem_limit: 64m

networks:
  caddy:
    name: caddy
  authelia:
    external: true

volumes:
  caddy_data:
  caddy_config:
