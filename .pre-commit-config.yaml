repos:
  - repo: local
    hooks:
      - id: treefmt
        name: treefmt (nix fmt)
        entry: nix fmt
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check -L
        language: system
        pass_filenames: false
        stages: [pre-push]
