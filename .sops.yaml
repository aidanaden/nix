# sops-nix configuration
# https://github.com/Mic92/sops-nix
#
# Setup:
# 1. Generate age key: age-keygen -o ~/.config/sops/age/keys.txt
# 2. Copy the PUBLIC key from the output (starts with "age1...")
# 3. Replace the placeholder below with your public key
# 4. Create secrets: sops secrets/secrets.yaml

keys:
  # Personal age key (generate with: age-keygen)
  # The public key looks like: age1xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  - &aidan age15n3l3w3xhvxhrplaggmtjgnwqdvs9xy08lptz9kl3f5rnjzgagesy585pe

creation_rules:
  # Encrypt all yaml files in secrets/ with the age key
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *aidan

  # Host-specific secrets (if needed later)
  - path_regex: hosts/.*/secrets\.yaml$
    key_groups:
      - age:
          - *aidan
